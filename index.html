<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🪿그건 먹는 게 아니야</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #5BB8F5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
#wrap { position: relative; }
canvas { display: block; }
#hud {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
}
.pill {
  background: rgba(255,255,255,0.88);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 16px;
  font-weight: 900;
  color: #333;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
}
.pill-yellow { background: rgba(255,220,50,0.92); }
.pill-red { background: rgba(255,80,80,0.92); color: #fff; }
@keyframes levelup {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.6); background: rgba(255,100,0,0.95); color: #fff; }
  60%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.levelup { animation: levelup 0.5s ease-out; }
.screen {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: rgba(0,0,0,0.52);
  display: flex;
  align-items: center;
  justify-content: center;
}
.screen.hide { display: none; }
.card {
  background: #fff;
  border-radius: 24px;
  padding: 28px 24px;
  width: 88%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 6px 32px rgba(0,0,0,0.28);
}
.card h1 { font-size: 22px; font-weight: 900; color: #222; line-height: 1.35; white-space: nowrap; }
.card .sub { font-size: 13px; color: #666; margin: 10px 0 16px; line-height: 1.7; }
.rules {
  background: #f4f4f4;
  border-radius: 12px;
  padding: 10px 14px;
  text-align: left;
  font-size: 13px;
  line-height: 1.9;
  color: #444;
  margin-bottom: 18px;
}
.g { color: #1565C0; font-weight: bold; }
.b { color: #C62828; font-weight: bold; }
.bigbtn {
  display: block;
  width: 100%;
  border: none;
  border-radius: 50px;
  padding: 15px;
  font-size: 19px;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
  box-shadow: 0 4px 0 rgba(0,0,0,0.18);
  transition: transform .1s, box-shadow .1s;
}
.bigbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
.btn-start { background: linear-gradient(135deg,#FF6B6B,#FF8E53); color:#fff; }
.btn-share { background: linear-gradient(135deg,#43E97B,#38F9D7); color:#fff; }
.btn-retry { background: linear-gradient(135deg,#667EEA,#764BA2); color:#fff; }
#finalPts  { font-size: 52px; font-weight: 900; color: #FF5722; margin: 10px 0; }
#toast {
  position: absolute;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.72);
  color: #fff;
  padding: 7px 20px;
  border-radius: 20px;
  font-size: 13px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🐟 <span id="sval">0</span>점</div>
    <div class="pill pill-yellow">Lv.<span id="lval">1</span></div>
    <div class="pill pill-red"><span id="hval">❤️❤️❤️</span></div>
  </div>
  <div class="screen" id="sStart">
    <div class="card">
      <h1>🪿그건 먹는 게 아니야</h1>
      <p class="sub">펠리컨을 좌우로 움직여<br>맛있는 건 먹고, 위험한 건 피하세요!</p>
      <div class="rules">
        <span class="g">✅ 먹어도 되는 것:</span> 🐙 🦑 🦐 🐟 🐠<br>
        <span class="b">❌ 먹으면 안 되는 것:</span> 👶 ⚽ 🏎️ 🗿 🎻 🚲 👟 💻
      </div>
      <button class="bigbtn btn-start" id="btnStart">▶ 게임 시작!</button>
    </div>
  </div>
  <div class="screen hide" id="sOver">
    <div class="card">
      <h1>😱 으악!</h1>
      <div id="finalPts">0점</div>
      <button class="bigbtn btn-share" id="btnShare">📣 점수 자랑하기!</button>
      <button class="bigbtn btn-retry" id="btnRetry">🔄 다시 도전!</button>
    </div>
  </div>
  <div id="toast">클립보드에 복사됐어요! 📋</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
const LW = 480, LH = 720; let dynLH = LH;
const dpr = window.devicePixelRatio || 1;
canvas.width  = LW * dpr;
canvas.height = LH * dpr;
ctx.scale(dpr, dpr);

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const mobile = navigator.maxTouchPoints > 0 || ('ontouchstart' in window);
  canvas.style.position = 'absolute';
  wrap.style.width  = vw + 'px';
  wrap.style.height = vh + 'px';
  if (mobile) {
    const scale = vw / LW;
    dynLH = Math.round(vh / scale);
    canvas.width  = Math.round(LW * dpr);
    canvas.height = Math.round(dynLH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    canvas.style.width  = vw + 'px';
    canvas.style.height = vh + 'px';
    canvas.style.left = '0';
    canvas.style.top  = '0';
  } else {
    dynLH = LH;
    const scale = Math.min(vw / LW, vh / LH);
    const cw = Math.round(LW * scale), ch = Math.round(LH * scale);
    canvas.width  = Math.round(LW * dpr);
    canvas.height = Math.round(LH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    canvas.style.width  = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.style.left = Math.round((vw - cw) / 2) + 'px';
    canvas.style.top  = Math.round((vh - ch) / 2) + 'px';
  }
}
resize();
window.addEventListener('resize', () => { resize(); pel.y = dynLH - 55; });

// ── Game state ─────────────────────────────────────────────────────────────
let STATE = 'start';
let gameId = 0;
let score = 0, level = 1, combo = 0, lives = 3;
let items = [], sparks = [], floats = [];
let shakeFrames = 0;
let belly = 0;       // 0..1, belly bloat after swallowing bad item
let face = 'norm';   // 'norm' | 'happy' | 'shock'
let faceTimer = 0;
let spawnTimer = 0, spawnInterval = 45;
let levelThreshold = 60;
let swallowed = '';

// ── Pelican ────────────────────────────────────────────────────────────────
const pel = { x: LW / 2, y: dynLH - 55, speed: 7, wingFlap: 0 };

// ── Item definitions ───────────────────────────────────────────────────────
const GOOD = ['🐙','🦑','🦐','🐟','🐠'];
const BAD  = ['👶','⚽','🏎️','🗿','🎻','🚲','👟','💻'];
const BAD_NAMES = { '👶':'아기','⚽':'축구공','🏎️':'레이싱카','🗿':'모아이','🎻':'바이올린','🚲':'자전거','👟':'신발','💻':'노트북' };
const ALL_DEFS = [
  ...GOOD.map(e => ({ e, good: true  })),
  ...BAD .map(e => ({ e, good: false })),
];

function spawnItem() {
  const def = ALL_DEFS[Math.floor(Math.random() * ALL_DEFS.length)];
  const sz  = 34 + Math.random() * 16;
  items.push({
    e: def.e, good: def.good,
    x: sz + Math.random() * (LW - sz * 2),
    y: -sz * 2,
    vy: (4.0 + level * 1.0 + Math.random() * 0.8) * (dynLH / LH),
    vx: (Math.random() - 0.5) * 0.08,
    sz,
    rot: 0, rv: 0,
  });
}

// ── Mouth hitbox ───────────────────────────────────────────────────────────
// Pelican head top: pel.y - bodyH + 4, beak starts from there
// bodyH = 52 + belly*18
function getMouth() {
  // Image 185x226 at (pel.x-106, pel.y-220); open mouth upper-right (52-93% x, 20-54% y)
  return {
    x1: pel.x - 5,
    x2: pel.x + 66,
    y1: pel.y - 175,
    y2: pel.y - 98,
  };
}

function inMouth(item) {
  const m = getMouth();
  return item.x >= m.x1 && item.x <= m.x2 &&
         item.y >= m.y1 && item.y <= m.y2;
}

// ── Particles & floating text ──────────────────────────────────────────────
function addSparks(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * 5;
    sparks.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 2,
      life: 1.0,
      decay: 0.03 + Math.random() * 0.025,
      r: 4 + Math.random() * 7,
      color,
    });
  }
}

function addFloat(x, y, txt, color) {
  floats.push({ x, y, txt, color, life: 1.0, vy: -1.8 });
}

// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key.startsWith('Arrow')) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

let mouseX = null;
function toCanvasX(clientX) {
  const r = canvas.getBoundingClientRect();
  return (clientX - r.left) * (LW / r.width);
}
canvas.addEventListener('mousemove',  e => { mouseX = toCanvasX(e.clientX); });
canvas.addEventListener('mouseleave', () => { mouseX = null; });
let isTouch = false;
canvas.addEventListener('touchstart', e => { e.preventDefault(); isTouch = true; mouseX = toCanvasX(e.touches[0].clientX); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); isTouch = true; mouseX = toCanvasX(e.touches[0].clientX); }, { passive: false });
canvas.addEventListener('touchend',   () => { isTouch = false; mouseX = null; });

// ── Update ─────────────────────────────────────────────────────────────────
function updatePelican(f) {
  let dx = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx =  1;

  if (mouseX !== null) {
    if (isTouch) {
      pel.x = Math.max(20, Math.min(LW - 70, mouseX));
    } else {
      const diff = mouseX - pel.x;
      if (Math.abs(diff) > pel.speed) {
        dx = Math.sign(diff);
      } else {
        pel.x = mouseX;
        dx = 0;
      }
    }
  }

  if (!isTouch) pel.x = Math.max(20, Math.min(LW - 70, pel.x + dx * pel.speed * f));
  pel.wingFlap = (pel.wingFlap + 0.07 * f) % (Math.PI * 2);

  belly     = Math.max(0, belly - 0.005 * f);
  faceTimer = Math.max(0, faceTimer - f);
  if (faceTimer <= 0) face = 'norm';
}

function updateItems(f) {
  const next = [];
  for (const it of items) {
    it.y   += it.vy * f;
    it.x   += it.vx * f;
    it.rot += it.rv * f;
    if (it.x < it.sz || it.x > LW - it.sz) it.vx *= -1;

    if (inMouth(it)) {
      if (it.good) {
        combo++;
        const pts = combo >= 3 ? 15 : 10;
        score += pts;
        face = 'happy'; faceTimer = 50;
        addSparks(it.x, it.y, '#29B6F6', 12);
        addFloat(it.x, it.y - 24, `+${pts}점${combo >= 3 ? ' COMBO!' : ''}`, '#1565C0');
        setHUD();
      } else {
        combo = 0;
        lives--;
        swallowed = BAD_NAMES[it.e] || it.e;
        belly = 1.0;
        shakeFrames = 20;
        addSparks(pel.x, pel.y, '#FF5722', 20);
        setHUD();
        if (lives <= 0) {
          face = 'shock'; faceTimer = 9999;
          addFloat(pel.x, pel.y - 80, '💥 게임 오버!', '#E53935');
          const gid = gameId;
          setTimeout(() => { if (gameId === gid) triggerGameOver(); }, 300);
        } else {
          face = 'shock'; faceTimer = 90;
          addFloat(pel.x, pel.y - 80, `💔 기회 ${lives}번 남음!`, '#FF5722');
        }
      }
      // item consumed — do not add to next
      continue;
    }

    if (it.y > dynLH + it.sz) {
      // item fell off screen
      if (it.good) {
        combo = 0;

        setHUD();
      }
      continue;
    }

    next.push(it);
  }
  items = next;
}

function updateSparks(f) {
  const next = [];
  for (const s of sparks) {
    s.x  += s.vx * f;
    s.y  += s.vy * f;
    s.vy += 0.2 * f;
    s.life -= s.decay * f;
    if (s.life > 0) next.push(s);
  }
  sparks = next;
}

function updateFloats(f) {
  const next = [];
  for (const fl of floats) {
    fl.y    += fl.vy * f;
    fl.life -= 0.022 * f;
    if (fl.life > 0) next.push(fl);
  }
  floats = next;
}

function checkLevel() {
  if (score >= levelThreshold) {
    level++;
    levelThreshold += 70 + level * 18;
    spawnInterval = Math.max(18, spawnInterval - 5);
    addFloat(LW / 2, dynLH / 2 - 60, `LEVEL ${level}! 🔥`, '#FF9800');
    setHUD();
    const lel = document.getElementById('lval').parentElement;
    lel.classList.remove('levelup');
    void lel.offsetWidth;
    lel.classList.add('levelup');
    lel.addEventListener('animationend', () => lel.classList.remove('levelup'), { once: true });
  }
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawBG() {
  ctx.save();

  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, dynLH);
  sky.addColorStop(0,    '#5BB8F5');
  sky.addColorStop(0.58, '#ADE0FF');
  sky.addColorStop(0.60, '#1A7FC1');
  sky.addColorStop(0.78, '#0C5F8A');
  sky.addColorStop(1,    '#0C5F8A');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, LW, dynLH);

  // sun
  ctx.beginPath();
  ctx.arc(64, 64, 38, 0, Math.PI * 2);
  ctx.fillStyle = '#FFE566';
  ctx.fill();

  // clouds
  drawCloud(110, 75, 0.85);
  drawCloud(330, 52, 1.05);
  drawCloud(220, 128, 0.65);

  // water shimmer
  const t = Date.now() / 900;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.ellipse(((i * 80 + t * 30) % LW), dynLH * 0.610, 28, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawCloud(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  for (const [x, y, r] of [[0,0,26],[-20,7,19],[20,7,19],[-9,-10,17],[11,-8,15]]) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPelican() {
  ctx.save();
  const px = pel.x, py = pel.y;
  const bob = Math.sin(pel.wingFlap) * 4;

  // Shadow
  ctx.beginPath();
  ctx.ellipse(px - 32, py + 2, 46, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fill();

  // 3D pelican image (328×400 natural size, drawn at 185×226 logical px)
  const iw = 185, ih = 226;
  const ix = px - 106, iy = py - 220 + bob;
  ctx.drawImage(PELICAN_IMG, ix, iy, iw, ih);

  // Face overlay expressions
  const eyeX = px - 25, eyeY = py - 143;
  if (face === 'shock') {
    ctx.strokeStyle = '#E53935';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(eyeX - 8, eyeY - 8); ctx.lineTo(eyeX + 8, eyeY + 8);
    ctx.moveTo(eyeX + 8, eyeY - 8); ctx.lineTo(eyeX - 8, eyeY + 8);
    ctx.stroke();
  } else if (face === 'happy') {
    ctx.beginPath();
    ctx.arc(eyeX, eyeY + 16, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,140,140,0.6)';
    ctx.fill();
  }

  ctx.restore();
}
function drawItems() {
  for (const it of items) {
    ctx.save();
    ctx.font = `${it.sz}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(it.e, Math.round(it.x), Math.round(it.y));
    ctx.restore();
  }
}

function drawSparks() {
  for (const s of sparks) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.beginPath();
    ctx.arc(s.x, s.y, Math.max(0.5, s.r * s.life), 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawFloats() {
  for (const f of floats) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 4;
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x, f.y);
    ctx.restore();
  }
}

// ── Game over ──────────────────────────────────────────────────────────────
function triggerGameOver() {
  if (STATE !== 'play') return;
  STATE = 'over';
  document.getElementById('finalPts').textContent = score + '점';
  document.getElementById('sOver').classList.remove('hide');
}

// ── HUD ────────────────────────────────────────────────────────────────────
function setHUD() {
  document.getElementById('sval').textContent = score;
  document.getElementById('lval').textContent = level;
  document.getElementById('hval').textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ── Main loop ──────────────────────────────────────────────────────────────
let _lastTs = 0;
let _f = 1;
let _fSmooth = 1;
function loop(ts) {
  requestAnimationFrame(loop);
  if (_lastTs) {
    const raw = Math.min((ts - _lastTs) / (1000 / 60), 2);
    _fSmooth = _fSmooth * 0.85 + raw * 0.15;
    _f = _fSmooth;
  }
  _lastTs = ts;

  // ── Update ──
  if (STATE === 'play') {
    spawnTimer += _f;
    if (spawnTimer >= spawnInterval) {
      spawnItem();
      spawnTimer = 0;
    }
    updatePelican(_f);
    updateItems(_f);
    checkLevel();
  }
  updateSparks(_f);
  updateFloats(_f);

  // ── Render ──
  // Always clear full canvas first — no translate pollution
  ctx.clearRect(0, 0, LW, dynLH);

  // Apply shake as a temporary save/restore block
  ctx.save();
  if (shakeFrames > 0) {
    shakeFrames = Math.max(0, shakeFrames - _f);
    const amp = shakeFrames * 0.2;
    ctx.translate((Math.random() - 0.5) * amp, (Math.random() - 0.5) * amp);
  }

  drawBG();
  drawSparks();
  drawItems();
  drawPelican();
  drawFloats();

  ctx.restore(); // ends shake block
}

// ── Start / retry ──────────────────────────────────────────────────────────
function startGame() {
  gameId++;
  STATE = 'play';
  score = 0; level = 1; combo = 0; lives = 3;
  items = []; sparks = []; floats = [];
  spawnTimer = 0; spawnInterval = 35;
  belly = 0; face = 'norm'; faceTimer = 0;
  shakeFrames = 0;
  levelThreshold = 60; swallowed = '';
  pel.x = LW / 2;
  setHUD();
  document.getElementById('sStart').classList.add('hide');
  document.getElementById('sOver').classList.add('hide');
}

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRetry').addEventListener('click', startGame);
document.getElementById('btnShare').addEventListener('click', () => {
  const text = `펠리컨이 ${swallowed || '이상한 것'} 삼키는 거 막다가 실패했다 ㅋㅋ 내 점수: ${score}점 🐦\n같이 해봐! → ${window.location.href}`;
  navigator.clipboard.writeText(text)
    .then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    })
    .catch(() => prompt('복사하세요:', text));
});

// ── Boot ───────────────────────────────────────────────────────────────────
setHUD();
requestAnimationFrame(loop);
</script>
